
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Costos</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select,button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2c7be5;
color:white;
border:none;
margin-top:15px;
font-weight:bold;
}

button:hover{
background:#1a68d1;
}

.resultado{
margin-top:20px;
padding:15px;
background:#f1f6ff;
border-radius:8px;
}

.receta{
background:#fafafa;
padding:10px;
border-radius:6px;
margin-top:10px;
border:1px solid #ddd;
}

.receta button{
margin-top:5px;
background:#e74c3c;
}

</style>
</head>

<body>

<div class="container">

<h1>Calculadora de Costos</h1>

<label>Nombre del producto</label>
<input id="nombre">

<label>Costo de producción ($)</label>
<input id="costo" type="number">

<label>Merma (%)</label>
<input id="merma" type="number" value="0">

<label>Margen de ganancia (%)</label>
<input id="margen" type="number" value="50">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

<button onclick="guardarReceta()">Guardar producto</button>

<h2>Historial</h2>

<div id="historial"></div>

</div>

<script>

let recetas = JSON.parse(localStorage.getItem("recetas")) || [];

function calcular(){

let costo = parseFloat(document.getElementById("costo").value);
let merma = parseFloat(document.getElementById("merma").value);
let margen = parseFloat(document.getElementById("margen").value);

let costoMerma = costo * (1 + merma/100);
let precio = costoMerma * (1 + margen/100);

let html = `
<b>Costo con merma:</b> $${costoMerma.toFixed(2)}<br>
<b>Precio sugerido:</b> $${precio.toFixed(2)}
`;

resultado.innerHTML = html;

window.precioActual = precio;

}

function guardarReceta(){

let nombre = document.getElementById("nombre").value;

if(!nombre || !window.precioActual) return;

recetas.push({

nombre:nombre,
precio:window.precioActual

});

localStorage.setItem("recetas",JSON.stringify(recetas));

mostrarRecetas();

}

function eliminar(i){

recetas.splice(i,1);

localStorage.setItem("recetas",JSON.stringify(recetas));

mostrarRecetas();

}

function mostrarRecetas(){

let contenedor = document.getElementById("historial");

contenedor.innerHTML="";

recetas.forEach((r,i)=>{

contenedor.innerHTML += `

<div class="receta">

<b>${r.nombre}</b><br>
Precio sugerido: $${r.precio.toFixed(2)}

<button onclick="eliminar(${i})">Eliminar</button>

</div>

`;

});

}

mostrarRecetas();

</script>

</body>
</html>
